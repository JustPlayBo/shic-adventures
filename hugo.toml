baseURL = "https://justplaybo.github.io/shic-adventures/"
languageCode = "en-us"
defaultContentLanguage = "en"
title = "SHIC — Sherlock Holmes Adventures"
theme = "shic"
enableRobotsTXT = true
enableEmoji = false
summaryLength = 40

[params]
description = "Original adventures for Sherlock Holmes — Consulting Detective. Public archive of adventures loaded by the sherlock.justplaybo.it companion app."
author = "JustPlayBo"
publisher = "JustPlayBo"
gameUrl = "https://sherlock.justplaybo.it/"
tagline = "Consulting Detective"
fontsHref = "https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=IM+Fell+English+SC&display=swap"

[params.colors]
ink = "#2a221a"
sepia = "#f5ecd9"
parchment = "#fbf6e7"
brass = "#a19476"
mahogany = "#644b13"
oxblood = "#7a2418"

[outputs]
home = ["HTML", "RSS"]
section = ["HTML", "RSS"]
page = ["HTML"]

[markup.goldmark.renderer]
unsafe = true

[markup.tableOfContents]
startLevel = 2
endLevel = 4

[permalinks]
# Use the filename as the URL slug so every adventure resolves at
# /adventures/<id>/ — keeps the JSON endpoint URL stable regardless of title.
adventures = "/adventures/:filename/"

[taxonomies]
tag = "tags"
difficulty = "difficulties"

[minify]
disableJSON = false
disableHTML = false
disableCSS = false
disableSVG = false
