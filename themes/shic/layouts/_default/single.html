{{ define "bodyclass" }}page page--single{{ end }}
{{ define "main" }}
<article class="article">
  <header class="article__head">
    <p class="article__eyebrow">{{ humanize .Section }}</p>
    <h1 class="article__title">{{ .Title }}</h1>
    {{ with .Params.subtitle }}<p class="article__sub">{{ . }}</p>{{ end }}
    {{ with .Params.summary }}<p class="article__lede">{{ . | safeHTML }}</p>{{ end }}
  </header>
  <div class="prose">{{ .Content }}</div>
</article>
{{ end }}
