<header class="site-header">
  <div class="container site-header__inner">
    <a class="site-brand" href="{{ "/" | relLangURL }}">
      <span class="site-brand__seal" aria-hidden="true">{{ partial "svg/monogram.html" . }}</span>
      <span class="site-brand__text">
        <span class="site-brand__title">{{ .Site.Title }}</span>
        <span class="site-brand__sub">{{ .Site.Params.tagline }}</span>
      </span>
    </a>
    <nav class="site-nav" aria-label="Navigazione principale">
      <ul>
        <li><a href="{{ "/" | relLangURL }}">Sala da disegno</a></li>
        <li><a href="{{ "/adventures/" | relLangURL }}">Avventure</a></li>
        <li><a href="{{ "/about/" | relLangURL }}">Sul caso</a></li>
        <li><a class="site-nav__cta" href="{{ .Site.Params.gameUrl }}" rel="noopener">Apri il companion</a></li>
      </ul>
    </nav>
  </div>
</header>
